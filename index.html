<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Dose for Sven</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <div>
                <h1>Daily Dose for Sven</h1>
                <div id="last-update"></div>
            </div>
            <div class="header-buttons">
                <button class="action-btn" id="refresh-btn" title="Feeds aktualisieren">🔄</button>
                <button class="theme-toggle" id="theme-toggle" title="Dark Mode umschalten">🌙</button>
            </div>
        </div>
    </header>

    <div id="feed-container">
        <div id="loading" style="text-align: center; color: var(--text-meta); padding: 40px;">
            Lade Nachrichten...
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
